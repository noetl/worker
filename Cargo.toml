[package]
name = "noetl-worker"
version = "1.1.2"
edition = "2021"
license = "MIT"
repository = "https://github.com/noetl/noetl"
homepage = "https://noetl.io"
description = "NoETL Worker Pool - Executes workflow commands via NATS"

[[bin]]
name = "noetl-worker"
path = "src/main.rs"

[dependencies]
# Tool library
noetl-tools = "2.8.7"

# Shared execution core -- types and utilities shared with the noetl
# CLI's local-mode runner.  Adoptions:
# - `condition::{Operator, Condition, evaluate_structured_condition}`
#   in place of the case_evaluator's inline duplicates (R-1.2 PR-2c).
# - `worker::source::{CommandSource, ClaimOutcome, Pulled, Command}`
#   in `nats::source::NatsCommandSource` (R-1.2 PR-2d-2, this PR).
# - `events::ExecutorEvent` adoption pending event-envelope
#   reconciliation across worker / server / executor — tracked
#   on noetl/ai-meta#30.
# See Appendix H of the global hybrid cloud blueprint at
# https://noetl.dev/docs/architecture/noetl_global_hybrid_cloud_grid_distributed_architecture_blueprint
# and especially § H.10 (the tree-walker vs pull-model finding).
noetl-executor = "0.3"

# Async runtime
tokio = { version = "1", features = ["macros", "rt-multi-thread", "signal", "time", "sync"] }

# Async trait macro — required for impl'ing noetl_executor's
# `worker::source::CommandSource` (the trait uses #[async_trait]).
async-trait = "0.1"

# NATS messaging
async-nats = "0.38"
futures = "0.3"

# HTTP client
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Error handling
thiserror = "2.0"
anyhow = "1.0"

# Regex
regex = "1.10"

# Utilities
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1", features = ["v4", "serde"] }
dotenvy = "0.15"
hostname = "0.4"

[dev-dependencies]
tokio-test = "0.4"
